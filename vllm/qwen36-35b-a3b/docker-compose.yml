# Standalone compose stack for Qwen 3.6-35B-A3B — NOT part of ../docker-compose.yml.
# Lives in its own directory so compose derives a project name of "qwen36",
# isolated from the main "vllm" stack's project/network namespace.
#
# Two mutually-exclusive variants (same port, same container name) behind
# compose profiles so a bare `docker compose up -d` starts neither by
# accident. Run one:
#
#   docker compose --profile fp8 up -d
#   docker compose --profile nvfp4 up -d
#
# To tweak settings, edit the command list below and re-run the same `up -d`
# — compose recreates the container in place instead of needing a manual
# `docker rm -f` first.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-gpu: &default-gpu
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

services:
  qwen36-fp8:
    image: vllm/vllm-openai:v0.25.1-ubuntu2404
    container_name: qwen36-35b-a3b
    profiles: ["fp8"]
    restart: unless-stopped
    logging: *default-logging
    <<: *default-gpu
    ports:
      - "8000:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ~/ext/cache/vllm:/root/.cache/vllm
    environment:
      HF_TOKEN: ${HF_TOKEN}
      VLLM_MARLIN_USE_ATOMIC_ADD: "1"
      VLLM_USE_DEEP_GEMM: "0"
      VLLM_MOE_USE_DEEP_GEMM: "0"
    command:
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --model
      - Qwen/Qwen3.6-35B-A3B-FP8
      - --max-model-len
      - "262144"
      - --served-model-name
      - Qwen3.6-35B-A3B
      - --max-num-batched-tokens
      - "32768"
      - --trust-remote-code
      - --gpu-memory-utilization
      - "0.7"
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_xml
      - --reasoning-parser
      - qwen3
      - --kv-cache-dtype
      - fp8
      - --load-format
      - fastsafetensors
      - --attention-backend
      - flashinfer
      - --moe-backend
      - triton
      - --speculative-config
      - '{"method":"mtp","num_speculative_tokens":3}'
      - --enable-prefix-caching
      - -tp
      - "1"
      - -pp
      - "1"

  qwen36-nvfp4:
    image: vllm/vllm-openai:v0.25.1-ubuntu2404
    container_name: qwen36-35b-a3b
    profiles: ["nvfp4"]
    restart: unless-stopped
    logging: *default-logging
    <<: *default-gpu
    ports:
      - "8000:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ~/ext/cache/vllm:/root/.cache/vllm
    environment:
      HF_TOKEN: ${HF_TOKEN}
    command:
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --model
      - nvidia/Qwen3.6-35B-A3B-NVFP4
      - --max-model-len
      - "262144"
      - --served-model-name
      - Qwen3.6-35B-A3B
      - --gpu-memory-utilization
      - "0.7"
      - --kv-cache-dtype
      - fp8
      - --attention-backend
      - flashinfer
      - --moe-backend
      - marlin
      - --tensor-parallel-size
      - "1"
      - --max-num-seqs
      - "8"
      - --max-num-batched-tokens
      - "8192"
      - --enable-prefix-caching
      - --async-scheduling
      - --enable-chunked-prefill
      - --load-format
      - fastsafetensors
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_xml
      - --speculative-config
      - '{"method":"mtp","num_speculative_tokens":3,"moe_backend":"triton"}'
